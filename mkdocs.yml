site_name: axklib
site_description: Yamaha A-series disk image and sampler object tooling.
site_url: https://tphzz.github.io/axklib/
repo_url: https://github.com/tphzz/axklib
repo_name: tphzz/axklib
docs_dir: docs
site_dir: build/docs/site
strict: true
use_directory_urls: false
extra_css:
  - stylesheets/axklib-material.css

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - toc.follow

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            docstring_style: google
            members_order: source
            filters:
              - "!^_[^_]"
              - "!^__.*__$"
            group_by_category: true
            show_category_heading: true
            show_if_no_docstring: true
            show_signature_annotations: true
            separate_signature: true
            show_bases: false
            show_source: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true

validation:
  omitted_files: ignore
  absolute_links: ignore
  unrecognized_links: ignore

nav:
  - Home: index.md
  - axklib:
      - Overview: axklib/index.md
      - Typical Usage: axklib/typical-usage.md
      - Formats:
          - SFS Filesystem: axklib/sfs-filesystem.md
          - FAT12 Floppy Images: axklib/floppy.md
          - CD-ROM Images: axklib/cdrom.md
          - Sampler Data Structures: axklib/sampler-data.md
      - Output Contracts:
          - Names, Paths, And Exports: axklib/names-and-paths.md
          - SFZ Export: axklib/sfz.md
          - Report Schemas: axklib/report-schemas.md
      - Yamaha Glossary: axklib/glossary.md
      - Public API:
          - Data Model: axklib/model.md
          - Containers: axklib/containers.md
          - Objects: axklib/objects.md
          - Audio: axklib/audio.md
          - Graph Helpers: axklib/graph.md
          - Relationships: axklib/relationships.md
          - Validation: axklib/validation.md
          - Reports: axklib/reports.md
      - Library Architecture: architecture.md

