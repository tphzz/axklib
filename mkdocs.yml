site_name: axklib
site_description: Native Yamaha A-series disk image and sampler object tooling.
site_url: https://tphzz.github.io/axklib/
repo_url: https://github.com/tphzz/axklib
repo_name: tphzz/axklib
docs_dir: docs
site_dir: build/docs/site
strict: true
use_directory_urls: false
extra_css:
  - stylesheets/axklib-material.css

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - toc.follow

markdown_extensions:
  - pymdownx.superfences

plugins:
  - search
  - mermaid-to-svg:
      renderer: mmdc
      mmdc_path: mmdc -b transparent
      theme: dark
      error_on_fail: true
      mermaid_config:
        htmlLabels: false
        fontFamily: Inter, system-ui, sans-serif
        themeVariables:
          background: transparent
          primaryColor: "#2b303b"
          primaryTextColor: "#e8edf5"
          primaryBorderColor: "#7c83ff"
          mainBkg: "#2b303b"
          nodeBorder: "#7c83ff"
          secondaryColor: "#263849"
          secondaryTextColor: "#e8edf5"
          secondaryBorderColor: "#45b8c5"
          tertiaryColor: "#20242d"
          tertiaryTextColor: "#e8edf5"
          tertiaryBorderColor: "#697386"
          lineColor: "#a8b1c2"
          textColor: "#e8edf5"
          edgeLabelBackground: "#20242d"
          clusterBkg: "#252a34"
          clusterBorder: "#697386"
          fontSize: 14px
        flowchart:
          htmlLabels: false

validation:
  omitted_files: ignore
  absolute_links: ignore
  unrecognized_links: ignore

nav:
  - Home: index.md
  - Getting Started:
      - Overview: axklib/index.md
      - C++ And CLI Usage: axklib/typical-usage.md
      - CLI Reference: axklib/cli.md
  - SDK:
      - C++ API: axklib/cpp-api.md
      - Portable Object Packages: axklib/portable-packages.md
      - Architecture: architecture.md
  - Formats:
      - Media Containers: axklib/media.md
      - SFS Filesystem: axklib/sfs-filesystem.md
      - FAT12 Floppy Images: axklib/floppy.md
      - CD-ROM Images: axklib/cdrom.md
      - Sampler Data Structures: axklib/sampler-data.md
  - Output Contracts:
      - Names, Paths, And Exports: axklib/names-and-paths.md
      - SFZ Export: axklib/sfz.md
      - Report Schemas: axklib/report-schemas.md
      - CLI JSON Schemas: axklib/cli-json-schemas.md
      - Writer And Alteration: axklib/write.md
  - Distribution:
      - Compatibility: axklib/compatibility.md
      - Versioning And Build Identity: axklib/versioning.md
      - REST And WebSocket Server: axklib/server.md
      - Native Dependencies: native-dependencies.md
  - Yamaha Glossary: axklib/glossary.md
