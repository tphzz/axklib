name: Native CI

on:
  workflow_dispatch:
    inputs:
      debug:
        description: "Debug"
        required: false
        default: false
        type: boolean
      notarize_macos:
        description: "macOS: Notarize"
        required: false
        default: false
        type: boolean
      sign_windows_desktop:
        description: "Windows: Sign axkdeck NSIS installers"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: native-${{ github.ref }}-${{ inputs.debug && 'debug' || 'release' }}
  cancel-in-progress: true

jobs:
  release-tools:
    name: Release tools
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout axklib
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.10.4"
          enable-cache: true
      - name: Validate release tools
        run: |
          uv --project tools/python run ruff check tools/python
          uv --project tools/python run mypy tools/python
          uv --project tools/python run pytest tools/python/tests
      - name: Validate selected release ref
        run: |
          cmake -DAXK_VERSION_SOURCE_DIR="${GITHUB_WORKSPACE}" \
            -DAXK_VERSION_PROJECT_MODULE="${GITHUB_WORKSPACE}/library/cmake/AxkProjectVersion.cmake" \
            -DAXK_VERSION_OUTPUT_METADATA="${GITHUB_WORKSPACE}/build/version_metadata.json" \
            -P library/cmake/GenerateProjectVersion.cmake
          python tools/python/release_metadata.py release-target \
            --version-metadata-file build/version_metadata.json \
            --ref-type "${GITHUB_REF_TYPE}" --ref-name "${GITHUB_REF_NAME}"
      - name: Validate checked-in server contract compatibility
        run: >-
          python tools/python/openapi_compat.py check
          --baseline apps/server/contracts/openapi-v1.compatibility.json
          --candidate apps/server/contracts/openapi-v1.json

  desktop-static:
    name: Desktop static checks
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout axklib
        uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/axkdeck/pnpm-lock.yaml
      - name: Install desktop dependencies
        working-directory: apps/axkdeck
        run: pnpm install --frozen-lockfile
      - name: Validate desktop sources
        working-directory: apps/axkdeck
        run: |
          pnpm version:check
          pnpm contract:check
          pnpm format:check
          pnpm test
          pnpm check
          pnpm build
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: rustfmt
      - name: Validate Rust formatting
        run: cargo fmt --manifest-path apps/axkdeck/src-tauri/Cargo.toml -- --check

  native:
    name: ${{ matrix.name }}
    needs:
      - release-tools
      - desktop-static
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            runner: ubuntu-24.04
            artifact: linux-x64
            desktop_platform: linux
            desktop_architecture: x64
            triplet: x64-linux-axk
            build_testing: "ON"
            run_tests: true
          - name: Linux ARM64
            runner: ubuntu-24.04-arm
            artifact: linux-arm64
            desktop_platform: linux
            desktop_architecture: arm64
            triplet: arm64-linux-axk
            build_testing: "ON"
            run_tests: true
          - name: Windows x64
            runner: windows-2025-vs2026
            artifact: windows-x64
            desktop_platform: windows
            desktop_architecture: x64
            triplet: x64-windows-axk
            build_testing: "ON"
            run_tests: true
            msvc_arch: x64
            msvc_component: Microsoft.VisualStudio.Component.VC.Tools.x86.x64
          - name: Windows ARM64
            runner: windows-11-vs2026-arm
            artifact: windows-arm64
            desktop_platform: windows
            desktop_architecture: arm64
            triplet: arm64-windows-axk
            build_testing: "ON"
            run_tests: true
            msvc_arch: arm64
            msvc_component: Microsoft.VisualStudio.Component.VC.Tools.ARM64
          - name: macOS x64 slice
            runner: macos-15-intel
            artifact: macos-x64
            triplet: x64-osx-axk
            build_testing: "ON"
            run_tests: true
            macos_slice: x86_64
          - name: macOS ARM64 slice
            runner: macos-15
            artifact: macos-arm64
            triplet: arm64-osx-axk
            build_testing: "ON"
            run_tests: true
            macos_slice: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout axklib
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.10.4"
          enable-cache: true

      - name: Resolve native cache inputs
        id: cache-inputs
        shell: bash
        run: |
          echo "vcpkg_revision=$(git rev-parse HEAD:external/vcpkg)" >> "$GITHUB_OUTPUT"
          echo "dependency_fingerprint=${{ hashFiles('vcpkg.json', 'CMakeLists.txt', 'CMakePresets.json', 'library/CMakeLists.txt', 'library/cmake/triplets/**', 'library/cmake/ports/**') }}" >> "$GITHUB_OUTPUT"

      - name: Configure vcpkg binary cache
        shell: bash
        run: |
          echo "VCPKG_DEFAULT_BINARY_CACHE=$RUNNER_TEMP/vcpkg/archives" >> "$GITHUB_ENV"
          cmake -E make_directory "$RUNNER_TEMP/vcpkg/archives"

      - name: Restore vcpkg binary cache
        id: vcpkg-cache
        uses: actions/cache@v6
        with:
          path: ${{ runner.temp }}/vcpkg/archives
          key: vcpkg-v2-${{ matrix.triplet }}-${{ steps.cache-inputs.outputs.vcpkg_revision }}-${{ steps.cache-inputs.outputs.dependency_fingerprint }}
          restore-keys: |
            vcpkg-v2-${{ matrix.triplet }}-${{ steps.cache-inputs.outputs.vcpkg_revision }}-
            vcpkg-v2-${{ matrix.triplet }}-

      - name: Locate Visual Studio 2026
        id: vs2026
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $installation = & $vswhere -version '[18.0,19.0)' -products '*' `
            -requires '${{ matrix.msvc_component }}' `
            -property installationPath |
            Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($installation)) {
            throw 'Visual Studio 18 with the C++ toolchain was not found'
          }
          "path=$installation" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Configure Visual Studio 2026
        if: runner.os == 'Windows'
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: ${{ matrix.msvc_arch }}
          vs-path: ${{ steps.vs2026.outputs.path }}

      - name: Verify Visual Studio 2026 compiler
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if ($env:VisualStudioVersion -notlike '18.*') {
            throw "Expected Visual Studio 18, found '$env:VisualStudioVersion'"
          }
          $compiler = (Get-Command cl.exe -ErrorAction Stop).Source
          if ($compiler -notlike '*\Microsoft Visual Studio\18\*') {
            throw "Expected Visual Studio 18 cl.exe, found '$compiler'"
          }
          "CC=cl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CXX=cl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Using $compiler"

      - name: Fingerprint native toolchain
        id: native-toolchain
        shell: bash
        run: >-
          python tools/python/native_build_cache.py fingerprint
          --triplet "${{ matrix.triplet }}"
          --github-output "$GITHUB_OUTPUT"

      - name: Restore native incremental build cache
        id: native-build-cache
        uses: actions/cache@v6
        with:
          path: |
            build/native/${{ inputs.debug && 'debug' || 'release' }}
            !build/native/${{ inputs.debug && 'debug' || 'release' }}/Testing/**
            !build/native/${{ inputs.debug && 'debug' || 'release' }}/*.spdx.json
          key: native-v1-${{ matrix.triplet }}-${{ inputs.debug && 'debug' || 'release' }}-${{ steps.native-toolchain.outputs.toolchain_fingerprint }}-${{ steps.cache-inputs.outputs.vcpkg_revision }}-${{ steps.cache-inputs.outputs.dependency_fingerprint }}-${{ github.sha }}
          restore-keys: |
            native-v1-${{ matrix.triplet }}-${{ inputs.debug && 'debug' || 'release' }}-${{ steps.native-toolchain.outputs.toolchain_fingerprint }}-${{ steps.cache-inputs.outputs.vcpkg_revision }}-${{ steps.cache-inputs.outputs.dependency_fingerprint }}-

      - name: Prepare native incremental build cache
        id: native-cache-state
        shell: bash
        run: >-
          python tools/python/native_build_cache.py prepare
          --source-root "${{ github.workspace }}"
          --build-directory "${{ github.workspace }}/build/native/${{ inputs.debug && 'debug' || 'release' }}"
          --github-output "$GITHUB_OUTPUT"

      - name: Bootstrap vcpkg
        if: runner.os != 'Windows'
        run: ./external/vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Bootstrap vcpkg
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\external\vcpkg\bootstrap-vcpkg.bat -disableMetrics

      - name: Set reproducible release timestamp
        shell: bash
        run: echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"

      - name: Configure native build
        id: configure-native
        run: >-
          cmake --preset ${{ inputs.debug && 'debug' || 'release' }}
          -DAXK_BUILD_SERVER=ON
          -DBUILD_TESTING=${{ matrix.build_testing }}
          -DAXK_SBOM_FILE=${{ github.workspace }}/build/native/${{ inputs.debug && 'debug' || 'release' }}/axklib-sdk.spdx.json
          -DAXK_CLI_SBOM_FILE=${{ github.workspace }}/build/native/${{ inputs.debug && 'debug' || 'release' }}/axklib-cli.spdx.json
          -DAXK_SERVER_SBOM_FILE=${{ github.workspace }}/build/native/${{ inputs.debug && 'debug' || 'release' }}/axklib-server.spdx.json
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}
          -DVCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}/library/cmake/triplets

      - name: Build native targets
        run: cmake --build --preset ${{ inputs.debug && 'debug' || 'release' }}

      - name: Resolve and verify build identity
        id: package
        shell: bash
        run: |
          set -euo pipefail
          root="build/native/${{ inputs.debug && 'debug' || 'release' }}"
          status="$(git status --porcelain --untracked-files=normal)"
          if [ -n "$status" ]; then
            printf 'CI source tree is modified:\n%s\n' "$status" >&2
            exit 1
          fi
          sha="$(git rev-parse --short=7 HEAD)"
          test -n "$sha"
          python tools/python/release_metadata.py resolve \
            --version-metadata-file "$root/version_metadata.json" \
            --package-basename-file "$root/package_basename.txt" \
            --ref-type "${GITHUB_REF_TYPE}" \
            --ref-name "${GITHUB_REF_NAME}" \
            --platform "${{ matrix.artifact }}" \
            --configuration "${{ inputs.debug && 'Debug' || 'Release' }}" \
            --github-output "$GITHUB_OUTPUT"
          cli="$root/apps/cli/axklib"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            cli="${cli}.exe"
          fi
          python tools/python/release_metadata.py verify-cli \
            --version-metadata-file "$root/version_metadata.json" \
            --package-basename-file "$root/package_basename.txt" \
            --cli "$cli" --git-sha-short "$sha" --ref-name "${GITHUB_REF_NAME}"

      - name: Generate component SBOMs
        shell: bash
        run: |
          set -euo pipefail
          root="build/native/${{ inputs.debug && 'debug' || 'release' }}"
          uv --project tools/python run python tools/python/generate_sbom.py --axklib-root . \
            --version-metadata-file "$root/version_metadata.json" \
            --package-basename-file "$root/package_basename.txt" --profile sdk \
            --output "$root/axklib-sdk.spdx.json"
          uv --project tools/python run python tools/python/generate_sbom.py --axklib-root . \
            --version-metadata-file "$root/version_metadata.json" \
            --package-basename-file "$root/package_basename.txt" --profile cli \
            --output "$root/axklib-cli.spdx.json"
          uv --project tools/python run python tools/python/generate_sbom.py --axklib-root . \
            --version-metadata-file "$root/version_metadata.json" \
            --package-basename-file "$root/package_basename.txt" --profile server \
            --output "$root/axklib-server.spdx.json"

      - name: Test native targets
        if: matrix.run_tests
        run: ctest --preset ${{ inputs.debug && 'debug' || 'release' }}

      - name: Stage and inspect native components
        shell: bash
        run: |
          set -euo pipefail
          root="build/native/${{ inputs.debug && 'debug' || 'release' }}"
          scan="build/tmp/package-scan-${{ matrix.artifact }}"
          rm -rf "$scan"
          mkdir -p "$scan/sdk" "$scan/cli" "$scan/server"
          cmake --install "$root" --prefix "$scan/sdk" --component sdk
          cmake --install "$root" --prefix "$scan/cli" --component cli
          cmake --install "$root" --prefix "$scan/server" --component server
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            macos_slice="build/tmp/macos-slice-${{ matrix.artifact }}"
            rm -rf "$macos_slice"
            mkdir -p "$macos_slice"
            cmake --install "$root" --prefix "$macos_slice" --component sdk
            cmake --install "$root" --prefix "$macos_slice" --component cli
            cmake --install "$root" --prefix "$macos_slice" --component server
          fi
          project_version="${{ steps.package.outputs.project_version }}"
          soversion="${{ steps.package.outputs.soversion }}"
          library_args=(
            --allow-library axklib.dll
            --allow-library libaxklib.so
            --allow-library "libaxklib.so.${soversion}"
            --allow-library "libaxklib.so.${project_version}"
            --allow-library libaxklib.dylib
            --allow-library "libaxklib.${soversion}.dylib"
            --allow-library "libaxklib.${project_version}.dylib"
          )
          python tools/python/inspect_package.py "$scan/sdk" "${library_args[@]}"
          python tools/python/inspect_package.py "$scan/cli"
          python tools/python/inspect_package.py "$scan/server"
          test -f "$scan/sdk/share/axklib/axklib.spdx.json"
          test -f "$scan/cli/share/axklib/axklib-cli.spdx.json"
          server_binary="axklib-server"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            server_binary="${server_binary}.exe"
          fi
          test -f "$scan/server/bin/$server_binary"
          test -f "$scan/server/share/axklib/axklib-server.spdx.json"
          test -f "$scan/server/share/axklib/server/openapi-v1.json"
          test -f "$scan/server/share/doc/axklib/server.md"

      - name: Smoke-test installed server
        if: matrix.run_tests
        shell: bash
        run: |
          set -euo pipefail
          server="build/tmp/package-scan-${{ matrix.artifact }}/server/bin/axklib-server"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            server="${server}.exe"
          fi
          python tools/python/release_server_smoke.py \
            --server "$server" \
            --fixture tests/fixtures/images/sampler-authored/HD00_512_single_sbnk_authored.hds

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/axkdeck/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          components: clippy

      - name: Restore desktop Rust cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/axkdeck/src-tauri/target
          key: axkdeck-rust-v1-${{ matrix.artifact }}-${{ hashFiles('apps/axkdeck/src-tauri/Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            axkdeck-rust-v1-${{ matrix.artifact }}-${{ hashFiles('apps/axkdeck/src-tauri/Cargo.lock') }}-
            axkdeck-rust-v1-${{ matrix.artifact }}-

      - name: Install Linux desktop packaging dependencies
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update && sudo apt-get install -y
          build-essential curl wget file pkg-config libssl-dev libxdo-dev
          libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev
          patchelf rpm libarchive-tools

      - name: Install desktop dependencies
        working-directory: apps/axkdeck
        run: pnpm install --frozen-lockfile

      - name: Select the tested native server for axkdeck
        shell: bash
        run: |
          set -euo pipefail
          server="$GITHUB_WORKSPACE/build/native/${{ inputs.debug && 'debug' || 'release' }}/apps/server/axklib-server"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            server="${server}.exe"
          fi
          test -f "$server"
          "$server" --print-version
          echo "AXKLIB_SERVER_BINARY=$server" >> "$GITHUB_ENV"

      - name: Test desktop Rust integration
        if: >-
          matrix.artifact == 'linux-x64' ||
          matrix.artifact == 'windows-x64' ||
          matrix.artifact == 'macos-arm64'
        run: cargo test --manifest-path apps/axkdeck/src-tauri/Cargo.toml

      - name: Lint desktop Rust integration
        if: matrix.artifact == 'linux-x64'
        run: |
          cargo clippy --manifest-path apps/axkdeck/src-tauri/Cargo.toml --all-targets -- -D warnings
          cargo clippy --manifest-path apps/axkdeck/src-tauri/Cargo.toml --all-targets --release -- -D warnings

      - name: Generate desktop SBOM from the tested native server
        shell: bash
        run: |
          set -euo pipefail
          root="build/native/${{ inputs.debug && 'debug' || 'release' }}"
          uv --project tools/python run python tools/python/generate_sbom.py \
            --axklib-root . \
            --axkdeck-root apps/axkdeck \
            --version-metadata-file "$root/version_metadata.json" \
            --package-basename-file "$root/package_basename.txt" \
            --profile server \
            --output apps/axkdeck/src-tauri/resources/axkdeck.spdx.json

      - name: Import Windows desktop signing certificate
        if: runner.os == 'Windows' && inputs.sign_windows_desktop
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE) -or
              [string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE_PASSWORD)) {
            throw 'WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD secrets are required'
          }
          $pfx = Join-Path $env:RUNNER_TEMP 'axkdeck-signing.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $pfx `
            -CertStoreLocation Cert:\CurrentUser\My -Password $password
          "WINDOWS_CERTIFICATE_THUMBPRINT=$($certificate.Thumbprint)" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Linux desktop packages
        if: runner.os == 'Linux'
        working-directory: apps/axkdeck
        run: pnpm tauri build

      - name: Build Windows desktop package
        if: runner.os == 'Windows'
        working-directory: apps/axkdeck
        shell: pwsh
        run: |
          if ('${{ inputs.sign_windows_desktop }}' -eq 'true') {
            $config = Join-Path $env:RUNNER_TEMP 'tauri-signing.json'
            @{
              bundle = @{
                windows = @{
                  certificateThumbprint = $env:WINDOWS_CERTIFICATE_THUMBPRINT
                  digestAlgorithm = 'sha256'
                  timestampUrl = 'http://timestamp.digicert.com'
                  tsp = $true
                }
              }
            } | ConvertTo-Json -Depth 4 | Set-Content -Path $config -Encoding utf8
            pnpm tauri build --config $config
          } else {
            pnpm tauri build
          }

      - name: Build macOS desktop slice
        if: runner.os == 'macOS'
        working-directory: apps/axkdeck
        run: pnpm tauri build --no-bundle

      - name: Reject nested native desktop builds
        shell: bash
        run: |
          if find apps/axkdeck/src-tauri/target -type f -name CMakeCache.txt -print -quit | grep .; then
            echo 'Cargo unexpectedly configured a nested axklib build.' >&2
            exit 1
          fi

      - name: Inspect Linux desktop packages
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          bundle=apps/axkdeck/src-tauri/target/release/bundle
          scan=build/tmp/axkdeck-package-scan-${{ matrix.artifact }}
          rm -rf "$scan"
          mkdir -p "$scan/deb" "$scan/rpm"
          deb=$(find "$bundle/deb" -type f -name '*.deb' -print -quit)
          rpm=$(find "$bundle/rpm" -type f -name '*.rpm' -print -quit)
          test -n "$deb"
          test -n "$rpm"
          dpkg-deb -x "$deb" "$scan/deb"
          rpm -Kv "$rpm"
          bsdtar -xf "$GITHUB_WORKSPACE/$rpm" -C "$scan/rpm"
          for root in "$scan/deb" "$scan/rpm"; do
            python tools/python/inspect_package.py "$root"
            find "$root" -type f -name axkdeck -print -quit | grep .
            find "$root" -type f -name axklib-server -print -quit | grep .
            find "$root" -type f -name axkdeck.spdx.json -print -quit | grep .
            find "$root" -type f -name LGPL-2.1-or-later.txt -print -quit | grep .
          done

      - name: Install and inspect Windows desktop package
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bundle = Join-Path $PWD 'apps\axkdeck\src-tauri\target\release\bundle\nsis'
          $installer = Get-ChildItem $bundle -Filter '*.exe' | Select-Object -First 1
          if ($null -eq $installer) { throw 'NSIS installer was not generated' }
          $install = Join-Path $env:RUNNER_TEMP 'axkdeck-installed'
          $process = Start-Process $installer.FullName -ArgumentList '/S', "/D=$install" -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "NSIS installation failed with $($process.ExitCode)" }
          python tools/python/inspect_package.py $install
          if (-not (Get-ChildItem $install -Recurse -Filter axkdeck.exe)) { throw 'axkdeck.exe missing' }
          if (-not (Get-ChildItem $install -Recurse -Filter axklib-server.exe)) { throw 'axklib-server.exe missing' }
          if (-not (Get-ChildItem $install -Recurse -Filter axkdeck.spdx.json)) { throw 'desktop SBOM missing' }
          if (-not (Get-ChildItem $install -Recurse -Filter LGPL-2.1-or-later.txt)) { throw 'LGPL notice missing' }
          $uninstaller = Get-ChildItem $install -Recurse -Filter 'uninstall.exe' | Select-Object -First 1
          if ($null -eq $uninstaller) { throw 'NSIS uninstaller missing' }
          $process = Start-Process $uninstaller.FullName -ArgumentList '/S' -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "NSIS uninstall failed with $($process.ExitCode)" }

      - name: Stage Linux desktop release packages
        if: runner.os == 'Linux'
        run: >-
          python tools/python/desktop_release.py
          --bundle-directory apps/axkdeck/src-tauri/target/release/bundle
          --extension .deb --extension .rpm
          --output-directory build/artifacts/axkdeck-${{ matrix.artifact }}
          --platform "${{ matrix.desktop_platform }}"
          --architecture "${{ matrix.desktop_architecture }}"
          --package-json apps/axkdeck/package.json
          --axklib-version-metadata build/native/${{ inputs.debug && 'debug' || 'release' }}/version_metadata.json
          --sbom apps/axkdeck/src-tauri/resources/axkdeck.spdx.json

      - name: Stage Windows desktop release package
        if: runner.os == 'Windows'
        run: >-
          python tools/python/desktop_release.py
          --bundle-directory apps/axkdeck/src-tauri/target/release/bundle/nsis
          --extension .exe
          --output-directory build/artifacts/axkdeck-${{ matrix.artifact }}
          --platform "${{ matrix.desktop_platform }}"
          --architecture "${{ matrix.desktop_architecture }}"
          --package-json apps/axkdeck/package.json
          --axklib-version-metadata build/native/${{ inputs.debug && 'debug' || 'release' }}/version_metadata.json
          --sbom apps/axkdeck/src-tauri/resources/axkdeck.spdx.json

      - name: Upload Linux or Windows desktop packages
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: release-axkdeck-${{ matrix.artifact }}
          path: build/artifacts/axkdeck-${{ matrix.artifact }}/*
          if-no-files-found: error

      - name: Package Linux or Windows SDK and CLI archives
        if: runner.os != 'macOS'
        shell: bash
        env:
          AXK_SDK_ARTIFACT_STEM: ${{ steps.package.outputs.sdk_artifact_stem }}
          AXK_CLI_ARTIFACT_STEM: ${{ steps.package.outputs.cli_artifact_stem }}
        run: |
          set -euo pipefail
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            archive_format=zip
          else
            archive_format=tar.gz
          fi
          python tools/python/release_metadata.py package-native \
            --source-directory "build/tmp/package-scan-${{ matrix.artifact }}/sdk" \
            --output-directory build/artifacts \
            --artifact-stem "$AXK_SDK_ARTIFACT_STEM" \
            --component sdk --archive-format "$archive_format"
          python tools/python/release_metadata.py package-native \
            --source-directory "build/tmp/package-scan-${{ matrix.artifact }}/cli" \
            --output-directory build/artifacts \
            --artifact-stem "$AXK_CLI_ARTIFACT_STEM" \
            --component cli --archive-format "$archive_format"

      - name: Verify Linux runtime dependency closure
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          root="build/native/${{ inputs.debug && 'debug' || 'release' }}"
          cli_dependencies="$(ldd "$root/apps/cli/axklib")"
          server_dependencies="$(ldd "$root/apps/server/axklib-server")"
          sdk_dependencies="$(ldd "$root/library/libaxklib.so")"
          printf '%s\n' "$cli_dependencies" "$server_dependencies" "$sdk_dependencies"
          if grep -Eqi 'lib(axk|sndfile|soxr|FLAC|ogg|vorbis|opus|mpg123|mp3lame)' \
              <<<"$cli_dependencies"; then
            echo "CLI has a private native runtime dependency" >&2
            exit 1
          fi
          if grep -Eqi 'lib(axk|sndfile|soxr|FLAC|ogg|vorbis|opus|mpg123|mp3lame)' \
              <<<"$server_dependencies"; then
            echo "server has a private native runtime dependency" >&2
            exit 1
          fi
          if grep -Eqi 'lib(sndfile|soxr|FLAC|ogg|vorbis|opus|mpg123|mp3lame)' \
              <<<"$sdk_dependencies"; then
            echo "C++ SDK has a private codec runtime dependency" >&2
            exit 1
          fi

      - name: Verify macOS runtime dependency closure
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          root="build/native/${{ inputs.debug && 'debug' || 'release' }}"
          cli_dependencies="$(otool -L "$root/apps/cli/axklib")"
          server_dependencies="$(otool -L "$root/apps/server/axklib-server")"
          sdk_dependencies="$(otool -L "$root/library/libaxklib.${{ steps.package.outputs.project_version }}.dylib")"
          printf '%s\n' "$cli_dependencies" "$server_dependencies" "$sdk_dependencies"
          if grep -Eqi 'lib(axk|sndfile|soxr|FLAC|ogg|vorbis|opus|mpg123|mp3lame)' \
              <<<"$(tail -n +2 <<<"$cli_dependencies")"; then
            echo "CLI has a private native runtime dependency" >&2
            exit 1
          fi
          if grep -Eqi 'lib(axk|sndfile|soxr|FLAC|ogg|vorbis|opus|mpg123|mp3lame)' \
              <<<"$(tail -n +2 <<<"$server_dependencies")"; then
            echo "server has a private native runtime dependency" >&2
            exit 1
          fi
          if grep -Eqi 'lib(sndfile|soxr|FLAC|ogg|vorbis|opus|mpg123|mp3lame)' \
              <<<"$(tail -n +2 <<<"$sdk_dependencies")"; then
            echo "C++ SDK has a private codec runtime dependency" >&2
            exit 1
          fi

      - name: Verify Windows runtime dependency closure
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $root = "build/native/${{ inputs.debug && 'debug' || 'release' }}"
          $cli = Get-ChildItem $root -Recurse -Filter axklib.exe | Select-Object -First 1
          $server = Get-ChildItem $root -Recurse -Filter axklib-server.exe | Select-Object -First 1
          $sdk = Get-ChildItem $root -Recurse -Filter axklib.dll | Select-Object -First 1
          if ($null -eq $cli -or $null -eq $server -or $null -eq $sdk) {
            throw "native runtime artifacts are missing"
          }
          $cliDependencies = (dumpbin /dependents $cli.FullName) -join "`n"
          $serverDependencies = (dumpbin /dependents $server.FullName) -join "`n"
          $sdkDependencies = (dumpbin /dependents $sdk.FullName) -join "`n"
          Write-Host $cliDependencies
          Write-Host $serverDependencies
          Write-Host $sdkDependencies
          $privateCli = '(?im)^\s+(?:lib)?(?:axk|sndfile|soxr|flac|ogg|vorbis|opus|mpg123|mp3lame)[^\s]*\.dll\s*$'
          $privateCodec = '(?im)^\s+(?:lib)?(?:sndfile|soxr|flac|ogg|vorbis|opus|mpg123|mp3lame)[^\s]*\.dll\s*$'
          if ($cliDependencies -match $privateCli) {
            throw "CLI has a private native runtime dependency: $($Matches[0])"
          }
          if ($serverDependencies -match $privateCli) {
            throw "server has a private native runtime dependency: $($Matches[0])"
          }
          if ($sdkDependencies -match $privateCodec) {
            throw "C++ SDK has a private codec runtime dependency: $($Matches[0])"
          }

      - name: Verify Windows ARM64 output
        if: matrix.triplet == 'arm64-windows-axk'
        shell: pwsh
        run: |
          $headers = dumpbin /headers build/native/${{ inputs.debug && 'debug' || 'release' }}/apps/cli/axklib.exe
          $machineHeaders = @($headers | Select-String -Pattern '\bmachine \(')
          $machineHeaders | ForEach-Object { Write-Host $_.Line }
          $arm64Headers = @($headers | Select-String -Pattern '^\s*AA64 machine \(ARM64\)\s*$')
          if ($arm64Headers.Count -eq 0) {
            $detected = ($machineHeaders | ForEach-Object { $_.Line.Trim() }) -join '; '
            throw "axklib.exe is not an ARM64 binary; detected headers: $detected"
          }
          $sdk = Get-ChildItem "build/native/${{ inputs.debug && 'debug' || 'release' }}" `
            -Recurse -Filter axklib.dll | Select-Object -First 1
          $sdkHeaders = dumpbin /headers $sdk.FullName
          if (@($sdkHeaders | Select-String -Pattern '^\s*AA64 machine \(ARM64\)\s*$').Count -eq 0) {
            throw 'axklib.dll is not an ARM64 binary'
          }
          $serverHeaders = dumpbin /headers `
            build/native/${{ inputs.debug && 'debug' || 'release' }}/apps/server/axklib-server.exe
          if (@($serverHeaders | Select-String -Pattern '^\s*AA64 machine \(ARM64\)\s*$').Count -eq 0) {
            throw 'axklib-server.exe is not an ARM64 binary'
          }

      - name: Print native dependency failure logs
        if: failure()
        shell: bash
        run: |
          for root in external/vcpkg/buildtrees build/native; do
            test -d "$root" || continue
            while IFS= read -r log; do
              echo "::group::$log"
              tail -n 300 "$log"
              echo "::endgroup::"
            done < <(find "$root" -type f \
              \( -name '*-out.log' -o -name '*-err.log' -o -name 'vcpkg-manifest-install.log' \) \
              -print | sort)
          done

      - name: Upload native dependency failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: native-dependency-logs-${{ matrix.triplet }}
          path: |
            external/vcpkg/buildtrees/**/*-out.log
            external/vcpkg/buildtrees/**/*-err.log
            build/native/**/vcpkg-manifest-install.log
          if-no-files-found: warn
          retention-days: 7

      - name: Save vcpkg binary cache after failure
        if: ${{ failure() && steps.configure-native.outcome == 'success' && steps.vcpkg-cache.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v6
        with:
          path: ${{ runner.temp }}/vcpkg/archives
          key: vcpkg-v2-${{ matrix.triplet }}-${{ steps.cache-inputs.outputs.vcpkg_revision }}-${{ steps.cache-inputs.outputs.dependency_fingerprint }}

      - name: Save native incremental build cache after failure
        if: ${{ failure() && steps.configure-native.outcome == 'success' && steps.native-build-cache.outputs.cache-hit != 'true' }}
        continue-on-error: true
        uses: actions/cache/save@v6
        with:
          path: |
            build/native/${{ inputs.debug && 'debug' || 'release' }}
            !build/native/${{ inputs.debug && 'debug' || 'release' }}/Testing/**
            !build/native/${{ inputs.debug && 'debug' || 'release' }}/*.spdx.json
          key: native-v1-${{ matrix.triplet }}-${{ inputs.debug && 'debug' || 'release' }}-${{ steps.native-toolchain.outputs.toolchain_fingerprint }}-${{ steps.cache-inputs.outputs.vcpkg_revision }}-${{ steps.cache-inputs.outputs.dependency_fingerprint }}-${{ github.sha }}

      - name: Package macOS slice for universal assembly
        if: runner.os == 'macOS'
        shell: bash
        run: |
          tar -czf "build/tmp/macos-${{ matrix.macos_slice }}.tar.gz" \
            -C "build/tmp/macos-slice-${{ matrix.artifact }}" .
          cp "build/native/${{ inputs.debug && 'debug' || 'release' }}/package_basename.txt" \
            "build/tmp/macos-${{ matrix.macos_slice }}-package-basename.txt"
          cp "build/native/${{ inputs.debug && 'debug' || 'release' }}/version_metadata.json" \
            "build/tmp/macos-${{ matrix.macos_slice }}-version-metadata.json"

      - name: Cache macOS slice for universal assembly
        if: runner.os == 'macOS'
        uses: actions/cache/save@v6
        with:
          path: |
            build/tmp/macos-${{ matrix.macos_slice }}.tar.gz
            build/tmp/macos-${{ matrix.macos_slice }}-package-basename.txt
            build/tmp/macos-${{ matrix.macos_slice }}-version-metadata.json
          key: macos-${{ matrix.macos_slice }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload Linux or Windows SDK archive
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ steps.package.outputs.sdk_artifact_stem }}
          path: build/artifacts/${{ steps.package.outputs.sdk_artifact_stem }}.*
          if-no-files-found: error

      - name: Upload Linux or Windows CLI archive
        if: runner.os != 'macOS'
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ steps.package.outputs.cli_artifact_stem }}
          path: build/artifacts/${{ steps.package.outputs.cli_artifact_stem }}.*
          if-no-files-found: error

  macos-universal:
    name: macOS universal
    needs: native
    runs-on: macos-15
    steps:
      - name: Checkout axklib
        uses: actions/checkout@v7
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.10.4"
          enable-cache: true

      - name: Restore x64 slice
        uses: actions/cache/restore@v6
        with:
          path: |
            build/tmp/macos-x86_64.tar.gz
            build/tmp/macos-x86_64-package-basename.txt
            build/tmp/macos-x86_64-version-metadata.json
          key: macos-x86_64-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            macos-x86_64-${{ github.run_id }}-
          fail-on-cache-miss: true

      - name: Restore ARM64 slice
        uses: actions/cache/restore@v6
        with:
          path: |
            build/tmp/macos-arm64.tar.gz
            build/tmp/macos-arm64-package-basename.txt
            build/tmp/macos-arm64-version-metadata.json
          key: macos-arm64-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            macos-arm64-${{ github.run_id }}-
          fail-on-cache-miss: true

      - name: Import macOS code signing certificate
        uses: apple-actions/import-codesign-certs@v7.0.0
        with:
          p12-file-base64: ${{ secrets.P12_BASE64 }}
          p12-password: ${{ secrets.P12_PASSWORD }}

      - name: Assemble and verify universal native binaries
        shell: bash
        run: |
          set -euo pipefail
          cmp build/tmp/macos-x86_64-package-basename.txt \
            build/tmp/macos-arm64-package-basename.txt
          cmp build/tmp/macos-x86_64-version-metadata.json \
            build/tmp/macos-arm64-version-metadata.json
          mkdir -p build/tmp/{x86_64,arm64,universal} build/artifacts
          tar -xzf build/tmp/macos-x86_64.tar.gz -C build/tmp/x86_64
          tar -xzf build/tmp/macos-arm64.tar.gz -C build/tmp/arm64
          cp -R build/tmp/arm64/. build/tmp/universal/

          lipo -create \
            build/tmp/x86_64/bin/axklib \
            build/tmp/arm64/bin/axklib \
            -output build/tmp/universal/bin/axklib
          lipo -create \
            build/tmp/x86_64/bin/axklib-server \
            build/tmp/arm64/bin/axklib-server \
            -output build/tmp/universal/bin/axklib-server

          while IFS= read -r arm64_library; do
            relative_path="${arm64_library#build/tmp/arm64/}"
            x64_library="build/tmp/x86_64/$relative_path"
            universal_library="build/tmp/universal/$relative_path"
            test -f "$x64_library"
            lipo -create "$x64_library" "$arm64_library" -output "$universal_library"
          done < <(find build/tmp/arm64/lib -type f \
            \( -name 'libaxk*.a' -o -name 'libaxk*.dylib' \) -print | sort)

          lipo build/tmp/universal/bin/axklib -verify_arch x86_64 arm64
          lipo -info build/tmp/universal/bin/axklib
          lipo build/tmp/universal/bin/axklib-server -verify_arch x86_64 arm64
          lipo -info build/tmp/universal/bin/axklib-server
          while IFS= read -r library; do
            lipo "$library" -verify_arch x86_64 arm64
            lipo -info "$library"
          done < <(find build/tmp/universal/lib -type f \
            \( -name 'libaxk*.a' -o -name 'libaxk*.dylib' \) -print | sort)

          build/tmp/universal/bin/axklib --version
          build/tmp/universal/bin/axklib-server --print-version
          cli_dependencies="$(otool -L build/tmp/universal/bin/axklib)"
          server_dependencies="$(otool -L build/tmp/universal/bin/axklib-server)"
          sdk_library=$(find build/tmp/universal/lib -type f \
            -name 'libaxklib*.dylib' -print -quit)
          test -n "$sdk_library"
          sdk_dependencies="$(otool -L "$sdk_library")"
          printf '%s\n' "$cli_dependencies" "$server_dependencies" "$sdk_dependencies"
          if grep -Eqi 'lib(axk|sndfile|soxr|FLAC|ogg|vorbis|opus|mpg123|mp3lame)' \
              <<<"$(tail -n +2 <<<"$cli_dependencies")"; then
            echo "universal CLI has a private native runtime dependency" >&2
            exit 1
          fi
          if grep -Eqi 'lib(axk|sndfile|soxr|FLAC|ogg|vorbis|opus|mpg123|mp3lame)' \
              <<<"$(tail -n +2 <<<"$server_dependencies")"; then
            echo "universal server has a private native runtime dependency" >&2
            exit 1
          fi
          if grep -Eqi 'lib(sndfile|soxr|FLAC|ogg|vorbis|opus|mpg123|mp3lame)' \
              <<<"$(tail -n +2 <<<"$sdk_dependencies")"; then
            echo "universal C++ SDK has a private codec runtime dependency" >&2
            exit 1
          fi

      - name: Resolve and verify universal build identity
        id: package
        shell: bash
        run: |
          set -euo pipefail
          status="$(git status --porcelain --untracked-files=normal)"
          if [ -n "$status" ]; then
            printf 'CI source tree is modified:\n%s\n' "$status" >&2
            exit 1
          fi
          sha="$(git rev-parse --short=7 HEAD)"
          package_file="build/tmp/macos-arm64-package-basename.txt"
          version_file="build/tmp/macos-arm64-version-metadata.json"
          python tools/python/release_metadata.py resolve \
            --version-metadata-file "$version_file" --package-basename-file "$package_file" \
            --ref-type "${GITHUB_REF_TYPE}" --ref-name "${GITHUB_REF_NAME}" \
            --platform macos-universal \
            --configuration "${{ inputs.debug && 'Debug' || 'Release' }}" \
            --github-output "$GITHUB_OUTPUT"
          python tools/python/release_metadata.py verify-cli \
            --version-metadata-file "$version_file" --package-basename-file "$package_file" \
            --cli build/tmp/universal/bin/axklib \
            --git-sha-short "$sha" --ref-name "${GITHUB_REF_NAME}"

      - name: Smoke-test universal installed server
        run: >-
          python tools/python/release_server_smoke.py
          --server build/tmp/universal/bin/axklib-server
          --fixture tests/fixtures/images/sampler-authored/HD00_512_single_sbnk_authored.hds

      - name: Sign macOS universal native binaries
        shell: bash
        env:
          MACOS_DEV_ID_CERT_NAME: ${{ secrets.MACOS_DEV_ID_CERT_NAME }}
        run: |
          set -euo pipefail

          if [ -z "$MACOS_DEV_ID_CERT_NAME" ]; then
            echo "MACOS_DEV_ID_CERT_NAME secret is required for macOS signing." >&2
            exit 1
          fi

          xattr -cr build/tmp/universal

          while IFS= read -r library; do
            codesign --force --timestamp --options runtime \
              --sign "$MACOS_DEV_ID_CERT_NAME" "$library"
            codesign --verify --strict --verbose=2 "$library"
          done < <(find build/tmp/universal/lib -type f -name '*.dylib' -print | sort)

          codesign --force --timestamp --options runtime \
            --sign "$MACOS_DEV_ID_CERT_NAME" build/tmp/universal/bin/axklib
          codesign --verify --strict --verbose=2 build/tmp/universal/bin/axklib
          codesign --force --timestamp --options runtime \
            --sign "$MACOS_DEV_ID_CERT_NAME" build/tmp/universal/bin/axklib-server
          codesign --verify --strict --verbose=2 build/tmp/universal/bin/axklib-server

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/axkdeck/pnpm-lock.yaml

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Restore universal desktop Rust cache
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            apps/axkdeck/src-tauri/target
          key: axkdeck-rust-v1-macos-universal-${{ hashFiles('apps/axkdeck/src-tauri/Cargo.lock') }}-${{ github.sha }}
          restore-keys: |
            axkdeck-rust-v1-macos-universal-${{ hashFiles('apps/axkdeck/src-tauri/Cargo.lock') }}-
            axkdeck-rust-v1-macos-universal-

      - name: Install desktop dependencies
        working-directory: apps/axkdeck
        run: pnpm install --frozen-lockfile

      - name: Generate universal desktop SBOM
        run: |
          uv --project tools/python run python tools/python/generate_sbom.py \
            --axklib-root . \
            --axkdeck-root apps/axkdeck \
            --version-metadata-file build/tmp/macos-arm64-version-metadata.json \
            --package-basename-file build/tmp/macos-arm64-package-basename.txt \
            --profile server \
            --output apps/axkdeck/src-tauri/resources/axkdeck.spdx.json

      - name: Build signed universal macOS desktop DMG
        working-directory: apps/axkdeck
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.MACOS_DEV_ID_CERT_NAME }}
          AXKLIB_SERVER_BINARY: ${{ github.workspace }}/build/tmp/universal/bin/axklib-server
        run: |
          set -euo pipefail
          test -n "$APPLE_SIGNING_IDENTITY"
          mkdir -p src-tauri/binaries
          cp "$AXKLIB_SERVER_BINARY" \
            src-tauri/binaries/axklib-server-universal-apple-darwin
          pnpm tauri build --target universal-apple-darwin

      - name: Verify universal macOS desktop package
        shell: bash
        run: |
          set -euo pipefail
          bundle=apps/axkdeck/src-tauri/target/universal-apple-darwin/release/bundle
          app=$(find "$bundle/macos" -type d -name '*.app' -print -quit)
          dmg=$(find "$bundle/dmg" -type f -name '*.dmg' -print -quit)
          test -n "$app"
          test -n "$dmg"
          codesign --verify --deep --strict --verbose=2 "$app"
          main="$app/Contents/MacOS/axkdeck"
          sidecar="$app/Contents/MacOS/axklib-server"
          test -f "$main"
          test -f "$sidecar"
          lipo "$main" -verify_arch x86_64 arm64
          lipo "$sidecar" -verify_arch x86_64 arm64
          test -f "$app/Contents/Resources/licenses/axkdeck.spdx.json"
          test -f "$app/Contents/Resources/licenses/LGPL-2.1-or-later.txt"

      - name: Stage universal macOS desktop release package
        run: >-
          python tools/python/desktop_release.py
          --bundle-directory apps/axkdeck/src-tauri/target/universal-apple-darwin/release/bundle/dmg
          --extension .dmg
          --output-directory build/artifacts/axkdeck-macos-universal
          --platform macos
          --architecture universal
          --package-json apps/axkdeck/package.json
          --axklib-version-metadata build/tmp/macos-arm64-version-metadata.json
          --sbom apps/axkdeck/src-tauri/resources/axkdeck.spdx.json

      - name: Package signed macOS universal SDK and CLI archives
        shell: bash
        env:
          AXK_SDK_ARTIFACT_STEM: ${{ steps.package.outputs.sdk_artifact_stem }}
          AXK_CLI_ARTIFACT_STEM: ${{ steps.package.outputs.cli_artifact_stem }}
        run: |
          set -euo pipefail
          python tools/python/release_metadata.py package-native \
            --source-directory build/tmp/universal \
            --output-directory build/artifacts \
            --artifact-stem "$AXK_SDK_ARTIFACT_STEM" \
            --component sdk --archive-format zip
          python tools/python/release_metadata.py package-native \
            --source-directory build/tmp/universal \
            --output-directory build/artifacts \
            --artifact-stem "$AXK_CLI_ARTIFACT_STEM" \
            --component cli --archive-format zip

      - name: Notarize macOS universal SDK and CLI archives
        if: inputs.notarize_macos
        shell: bash
        env:
          APPLE_NOTARY_USER: ${{ secrets.APPLE_NOTARY_USER }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          missing=0
          for name in APPLE_NOTARY_USER APPLE_NOTARY_APP_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name:-}" ]; then
              echo "$name secret is required for macOS notarization." >&2
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          for archive in \
            "build/artifacts/${{ steps.package.outputs.sdk_artifact_stem }}.zip" \
            "build/artifacts/${{ steps.package.outputs.cli_artifact_stem }}.zip"; do
            test -f "$archive"
            xcrun notarytool submit "$archive" \
              --apple-id "$APPLE_NOTARY_USER" \
              --password "$APPLE_NOTARY_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
          done

      - name: Notarize and staple universal macOS desktop DMG
        if: inputs.notarize_macos
        shell: bash
        env:
          APPLE_NOTARY_USER: ${{ secrets.APPLE_NOTARY_USER }}
          APPLE_NOTARY_APP_PASSWORD: ${{ secrets.APPLE_NOTARY_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          dmg=$(find build/artifacts/axkdeck-macos-universal \
            -type f -name '*.dmg' -print -quit)
          test -n "$dmg"
          xcrun notarytool submit "$dmg" \
            --apple-id "$APPLE_NOTARY_USER" \
            --password "$APPLE_NOTARY_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$dmg"

      - name: Verify staged universal macOS desktop DMG
        shell: bash
        run: |
          set -euo pipefail
          dmg=$(find build/artifacts/axkdeck-macos-universal \
            -type f -name '*.dmg' -print -quit)
          test -n "$dmg"
          codesign --verify --strict --verbose=2 "$dmg"

          mount_dir=$(mktemp -d)
          mounted=0
          cleanup() {
            if [ "$mounted" -eq 1 ]; then
              hdiutil detach "$mount_dir" >/dev/null || true
            fi
            rmdir "$mount_dir" 2>/dev/null || true
          }
          trap cleanup EXIT

          hdiutil attach "$dmg" -nobrowse -readonly -mountpoint "$mount_dir"
          mounted=1
          app=$(find "$mount_dir" -type d -name '*.app' -print -quit)
          test -n "$app"
          test -f "$app/Contents/MacOS/axkdeck"
          test -f "$app/Contents/MacOS/axklib-server"
          codesign --verify --deep --strict --verbose=2 "$app"
          codesign --verify --strict --verbose=2 "$app/Contents/MacOS/axkdeck"
          codesign --verify --strict --verbose=2 "$app/Contents/MacOS/axklib-server"

          if [ "${{ inputs.notarize_macos }}" = "true" ]; then
            xcrun stapler validate "$dmg"
            spctl --assess --type open --context context:primary-signature \
              --verbose=4 "$dmg"
            spctl --assess --type execute --verbose=4 "$app"
          fi

      - name: Upload universal macOS desktop DMG
        uses: actions/upload-artifact@v7
        with:
          name: release-axkdeck-macos-universal
          path: build/artifacts/axkdeck-macos-universal/*
          if-no-files-found: error

      - name: Upload universal macOS SDK archive
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ steps.package.outputs.sdk_artifact_stem }}
          path: build/artifacts/${{ steps.package.outputs.sdk_artifact_stem }}.zip
          if-no-files-found: error

      - name: Upload universal macOS CLI archive
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ steps.package.outputs.cli_artifact_stem }}
          path: build/artifacts/${{ steps.package.outputs.cli_artifact_stem }}.zip
          if-no-files-found: error

  draft-release:
    name: Draft release
    if: ${{ !inputs.debug }}
    needs:
      - native
      - macos-universal
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    concurrency:
      group: native-draft-release-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout axklib
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download release deliverables
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: build/release-assets
          merge-multiple: true

      - name: Verify release assets
        run: >-
          python tools/python/release_metadata.py verify-release-assets
          --directory build/release-assets

      - name: Resolve draft release target
        id: release
        run: |
          cmake -DAXK_VERSION_SOURCE_DIR="${GITHUB_WORKSPACE}" \
            -DAXK_VERSION_PROJECT_MODULE="${GITHUB_WORKSPACE}/library/cmake/AxkProjectVersion.cmake" \
            -DAXK_VERSION_OUTPUT_METADATA="${GITHUB_WORKSPACE}/build/version_metadata.json" \
            -P library/cmake/GenerateProjectVersion.cmake
          python tools/python/release_metadata.py release-target \
            --version-metadata-file build/version_metadata.json \
            --ref-type "${GITHUB_REF_TYPE}" --ref-name "${GITHUB_REF_NAME}" \
            --github-output "${GITHUB_OUTPUT}"

      - name: Create release notes
        shell: bash
        run: |
          cat > build/release-notes.md <<EOF
          Draft generated by [Native CI run ${GITHUB_RUN_NUMBER}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}).

          - Source ref: \`${GITHUB_REF_NAME}\`
          - Commit: \`${GITHUB_SHA}\`
          - Configuration: \`Release\`

          Review the attached SDK archives, CLI archives, and axkdeck installers before publishing this release.
          EOF

      - name: Replace draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.tag_name }}
          RELEASE_TITLE: ${{ steps.release.outputs.title }}
          CLEANUP_TAG: ${{ steps.release.outputs.cleanup_tag }}
          VERIFY_TAG: ${{ steps.release.outputs.verify_tag }}
          PRERELEASE: ${{ steps.release.outputs.prerelease }}
        run: |
          set -euo pipefail

          if is_draft="$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft 2>/dev/null)"; then
            if [[ "$is_draft" != "true" ]]; then
              echo "Refusing to replace published release '$RELEASE_TAG'." >&2
              exit 1
            fi
            gh release delete "$RELEASE_TAG" --yes
          fi
          if [[ "$CLEANUP_TAG" == "true" ]] &&
             git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            git push origin --delete "refs/tags/$RELEASE_TAG"
          fi

          create_args=(
            "$RELEASE_TAG"
            build/release-assets/*
            --draft
            --title "$RELEASE_TITLE"
            --notes-file build/release-notes.md
          )
          if [[ "$VERIFY_TAG" == "true" ]]; then
            create_args+=(--verify-tag)
          else
            create_args+=(--target "$GITHUB_SHA")
          fi
          if [[ "$PRERELEASE" == "true" ]]; then
            create_args+=(--prerelease)
          fi
          gh release create "${create_args[@]}"
