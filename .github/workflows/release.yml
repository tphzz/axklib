name: Native Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  sdk:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            artifact: linux-x64
            triplet: x64-linux-axk
          - runner: ubuntu-24.04-arm
            artifact: linux-arm64
            triplet: arm64-linux-axk
          - runner: windows-2025
            artifact: windows-x64
            triplet: x64-windows-axk
          - runner: windows-11-arm
            artifact: windows-arm64
            triplet: arm64-windows-axk
          - runner: macos-15-intel
            artifact: macos-x64
            triplet: x64-osx-axk
          - runner: macos-15
            artifact: macos-arm64
            triplet: arm64-osx-axk
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Checkout pinned vcpkg
        uses: actions/checkout@v4
        with:
          repository: microsoft/vcpkg
          ref: f87344cac03158cbf1467264565f1fd36b382a24
          path: .vcpkg
      - name: Bootstrap vcpkg (Unix)
        if: runner.os != 'Windows'
        run: ./.vcpkg/bootstrap-vcpkg.sh -disableMetrics
      - name: Bootstrap vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\.vcpkg\bootstrap-vcpkg.bat -disableMetrics
      - name: Generate SPDX document
        shell: bash
        run: |
          mkdir -p build/release
          python oracle/generate_sbom.py --axklib-root . --output build/release/axklib.spdx.json
      - name: Configure
        shell: bash
        env:
          VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
          AXK_PATH_REMAP_FROM: ${{ github.workspace }}
        run: >-
          cmake -S . -B build/release/native -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}
          -DVCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}/cpp/cmake/triplets
          -DAXK_SBOM_FILE="${{ github.workspace }}/build/release/axklib.spdx.json"
          -DBUILD_TESTING=ON
      - name: Build and test
        run: |
          cmake --build build/release/native
          ctest --test-dir build/release/native --output-on-failure
      - name: Install SDK
        run: cmake --install build/release/native --prefix build/release/install
      - name: Inspect installed SDK
        shell: bash
        run: |
          args=()
          case "${{ runner.os }}" in
            Linux) args+=(--allow-library libaxklib_c.so --allow-library libaxklib_c.so.0 --allow-library libaxklib_c.so.0.1.0) ;;
            macOS) args+=(--allow-library libaxklib_c.dylib --allow-library libaxklib_c.0.dylib --allow-library libaxklib_c.0.1.0.dylib) ;;
            Windows) args+=(--allow-library axklib_c.dll) ;;
          esac
          python oracle/inspect_package.py build/release/install "${args[@]}"
      - name: External installed consumers
        shell: bash
        env:
          VCPKG_ROOT: ${{ github.workspace }}/.vcpkg
        run: |
          cmake -S cpp/tests/consumer -B build/release/consumer -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/build/release/install" \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }} \
            -DVCPKG_OVERLAY_TRIPLETS=${{ github.workspace }}/cpp/cmake/triplets \
            -DVCPKG_INSTALLED_DIR=${{ github.workspace }}/build/release/native/vcpkg_installed
          cmake --build build/release/consumer
          if [[ "${{ runner.os }}" == Windows ]]; then
            export PATH="${{ github.workspace }}/build/release/install/bin:$PATH"
            build/release/consumer/axk_consumer.exe
            build/release/consumer/axk_c_consumer.exe
          elif [[ "${{ runner.os }}" == macOS ]]; then
            export DYLD_LIBRARY_PATH="${{ github.workspace }}/build/release/install/lib"
            build/release/consumer/axk_consumer
            build/release/consumer/axk_c_consumer
          else
            export LD_LIBRARY_PATH="${{ github.workspace }}/build/release/install/lib"
            build/release/consumer/axk_consumer
            build/release/consumer/axk_c_consumer
          fi
      - name: Uninstall smoke
        shell: bash
        run: |
          cmake --build build/release/native --target uninstall
          test ! -e build/release/install/bin/axklib
          test ! -e build/release/install/include/axklib/axklib.hpp
      - name: Package and checksum
        shell: bash
        run: |
          cmake --build build/release/native --target package
          mkdir -p build/release/artifacts
          find build/release/native -maxdepth 1 -type f \( -name '*.zip' -o -name '*.tar.gz' \) \
            -exec cp {} build/release/artifacts/ \;
          cmake -E sha256sum build/release/artifacts/* > build/release/artifacts/SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: axklib-${{ matrix.artifact }}
          path: build/release/artifacts/*
          if-no-files-found: error

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: sdk
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: axklib-*
          path: artifacts
          merge-multiple: false
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: true
