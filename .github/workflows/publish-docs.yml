name: Publish Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install documentation environment
        run: uv --project docs sync --locked

      - name: Publish documentation
        run: |
          mkdir -p build/docs/site
          uv --project docs run mkdocs gh-deploy --config-file mkdocs.yml --force
